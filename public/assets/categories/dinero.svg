<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 480" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0f0d08"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.7" cy="0.25" r="0.55">
      <stop offset="0%" stop-color="#eab308" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#eab308" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.2" cy="0.7" r="0.5">
      <stop offset="0%" stop-color="#facc15" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#facc15" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="0.5" cy="0.05" r="0.35">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0"/>
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.06"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#eab308" stroke-opacity="0.05" stroke-width="0.5"/>
    </pattern>
    <!-- Chart line gradient -->
    <linearGradient id="chartFill" x1="0" y1="0" x2="0" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#eab308" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#eab308" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="480" fill="url(#bg)"/>
  <rect width="1400" height="480" fill="url(#glow1)"/>
  <rect width="1400" height="480" fill="url(#glow2)"/>
  <rect width="1400" height="480" fill="url(#glow3)"/>
  <rect width="1400" height="480" fill="url(#grid)"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="100" r="220" fill="none" stroke="#eab308" stroke-opacity="0.07" stroke-width="0.8"/>
  <circle cx="1100" cy="100" r="300" fill="none" stroke="#eab308" stroke-opacity="0.035" stroke-width="0.5"/>
  <circle cx="200" cy="400" r="180" fill="none" stroke="#facc15" stroke-opacity="0.05" stroke-width="0.8"/>

  <!-- Rising chart line -->
  <path d="M0,400 C100,390 200,395 300,380 C400,365 450,370 500,350 C600,310 650,320 700,290 C800,240 850,250 900,210 C950,185 1000,190 1050,160 C1100,130 1150,140 1200,110 C1250,85 1300,90 1400,60"
    fill="none" stroke="#eab308" stroke-opacity="0.18" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Area under chart -->
  <path d="M0,400 C100,390 200,395 300,380 C400,365 450,370 500,350 C600,310 650,320 700,290 C800,240 850,250 900,210 C950,185 1000,190 1050,160 C1100,130 1150,140 1200,110 C1250,85 1300,90 1400,60 L1400,480 L0,480Z"
    fill="url(#chartFill)"/>

  <!-- Bar chart elements (abstract) -->
  <g opacity="0.08">
    <rect x="100" y="320" width="24" height="100" rx="4" fill="#eab308"/>
    <rect x="140" y="290" width="24" height="130" rx="4" fill="#eab308"/>
    <rect x="180" y="260" width="24" height="160" rx="4" fill="#eab308"/>
    <rect x="220" y="300" width="24" height="120" rx="4" fill="#eab308"/>
    <rect x="260" y="250" width="24" height="170" rx="4" fill="#eab308"/>
    <rect x="300" y="230" width="24" height="190" rx="4" fill="#eab308"/>
  </g>

  <!-- Dollar sign (large, right side) -->
  <g transform="translate(1080, 130)" opacity="0.10">
    <text font-family="system-ui, -apple-system, sans-serif" font-size="240" font-weight="700" fill="#eab308">$</text>
  </g>

  <!-- Floating dots -->
  <circle cx="500" cy="90" r="3" fill="#eab308" opacity="0.3"/>
  <circle cx="750" cy="420" r="2" fill="#facc15" opacity="0.22"/>
  <circle cx="350" cy="150" r="2.5" fill="#fde68a" opacity="0.18"/>
  <circle cx="950" cy="400" r="1.8" fill="#eab308" opacity="0.25"/>
  <circle cx="1250" cy="350" r="2.2" fill="#facc15" opacity="0.2"/>

  <!-- Coin-like circles -->
  <circle cx="680" cy="140" r="30" fill="none" stroke="#eab308" stroke-opacity="0.1" stroke-width="1.2"/>
  <circle cx="680" cy="140" r="22" fill="none" stroke="#eab308" stroke-opacity="0.06" stroke-width="0.8"/>
  <circle cx="420" cy="350" r="22" fill="none" stroke="#facc15" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="420" cy="350" r="16" fill="none" stroke="#facc15" stroke-opacity="0.05" stroke-width="0.6"/>

  <!-- Arrow up indicators -->
  <g transform="translate(800, 80)" opacity="0.12">
    <path d="M0,20 L8,0 L16,20" fill="none" stroke="#eab308" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(560, 200)" opacity="0.08">
    <path d="M0,16 L6,0 L12,16" fill="none" stroke="#facc15" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Bottom fade -->
  <linearGradient id="bottomFade" x1="0" y1="360" x2="0" y2="480" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#0a0a0a" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0a0a0a" stop-opacity="1"/>
  </linearGradient>
  <rect y="360" width="1400" height="120" fill="url(#bottomFade)"/>

  <!-- Texture -->
  <rect width="1400" height="480" filter="url(#noise)" opacity="0.4"/>
</svg>